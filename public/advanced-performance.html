<!-- Advanced Performance Optimizer for Domiradios -->

<!-- Critical CSS inline para eliminar bloqueo de renderizado -->
<style id="critical-css">
/* Carga del Critical CSS para mejorar First Contentful Paint */
@import url('/css/critical.css');
</style>

<!-- Optimizaciones para recursos que bloquean el renderizado -->
<script>
// Función para cargar CSS de forma asíncrona
function loadCSS(href) {
  const link = document.createElement('link');
  link.rel = 'stylesheet';
  link.href = href;
  link.media = 'print';
  document.head.appendChild(link);
  
  // Cambiar a 'all' cuando esté cargado
  link.onload = function() {
    this.media = 'all';
  };
}

// Identificar y posponer CSS no crítico
document.addEventListener('DOMContentLoaded', function() {
  // Lista de todas las hojas de estilo
  const stylesheets = Array.from(document.querySelectorAll('link[rel="stylesheet"]'));
  
  // Mantener solo aquellas marcadas como críticas
  stylesheets.forEach(function(stylesheet) {
    if (!stylesheet.getAttribute('data-critical')) {
      // Obtener la URL de la hoja de estilo
      const href = stylesheet.getAttribute('href');
      
      if (href) {
        // Eliminar la hoja de estilo original
        stylesheet.parentNode.removeChild(stylesheet);
        
        // Cargarla de forma asíncrona
        requestIdleCallback(function() {
          loadCSS(href);
        });
      }
    }
  });
});

// Cargar imágenes de forma inteligente y adaptativa
document.addEventListener('DOMContentLoaded', function() {
  // Cargar script optimizador de imágenes
  const script = document.createElement('script');
  script.src = '/js/image-optimizer.js';
  script.async = true;
  document.body.appendChild(script);
});

// Optimizador de caché para recursos estáticos
function setupCacheControl() {
  // Lista de tipos de recursos estáticos
  const staticTypes = [
    '.css', '.js', '.jpg', '.jpeg', '.png', '.gif', '.webp', 
    '.svg', '.woff', '.woff2', '.ttf', '.eot'
  ];
  
  // Verificar todos los recursos cargados
  const resources = window.performance.getEntriesByType('resource');
  const cacheMisses = [];
  
  resources.forEach(function(resource) {
    const url = resource.name;
    const extension = url.substring(url.lastIndexOf('.'));
    
    // Comprobar si es un recurso estático
    if (staticTypes.includes(extension)) {
      // Comprobar si este recurso podría beneficiarse de mejor caché
      if (!resource.transferSize || resource.transferSize > 1000) { // Más de 1KB
        cacheMisses.push({
          url: url,
          size: resource.transferSize || 0,
          type: extension
        });
      }
    }
  });
  
  // Reportar recursos que podrían mejorarse (solo durante desarrollo)
  if (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1') {
    if (cacheMisses.length > 0) {
      console.group('🚀 Recursos que podrían beneficiarse de mejor caché:');
      console.table(cacheMisses);
      console.groupEnd();
    }
  }
}

// Ejecutar verificación de caché después de carga completa
window.addEventListener('load', function() {
  // Dar tiempo para terminar de cargar todos los recursos
  setTimeout(setupCacheControl, 3000);
});
</script>

<!-- Optimización de tiempos de respuesta del servidor -->
<script>
// Prefetch para mejorar tiempos de respuesta
document.addEventListener('DOMContentLoaded', function() {
  // Enlaces que es probable que el usuario visite
  const likelyUrls = [
    '/emisoras',
    '/ciudades',
    '/contacto'
  ];
  
  // Esperar a que la página principal esté cargada
  requestIdleCallback(function() {
    likelyUrls.forEach(function(url) {
      const link = document.createElement('link');
      link.rel = 'prefetch';
      link.href = url;
      document.head.appendChild(link);
    });
  });
});
</script>

<!-- Resource Hints para CDNs y recursos externos -->
<link rel="preconnect" href="https://fonts.googleapis.com" crossorigin>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
